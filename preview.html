<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallpaper Preview - hhkungfu.ee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #00d9ff;
    }
    .summary {
      text-align: center;
      margin-bottom: 30px;
      color: #888;
    }
    .category {
      margin-bottom: 40px;
    }
    .category-header {
      background: linear-gradient(90deg, #16213e, transparent);
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .category-header h2 {
      color: #00d9ff;
      font-size: 1.4em;
    }
    .category-header .count {
      background: #00d9ff;
      color: #1a1a2e;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
    }
    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }
    .card-info {
      padding: 12px;
    }
    .card-title {
      font-size: 0.9em;
      font-weight: 600;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-path {
      font-size: 0.7em;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .tag {
      font-size: 0.65em;
      background: rgba(0, 217, 255, 0.2);
      color: #00d9ff;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .actions {
      text-align: center;
      margin-top: 40px;
      padding: 30px;
      background: #16213e;
      border-radius: 12px;
    }
    .actions h3 {
      margin-bottom: 15px;
      color: #00d9ff;
    }
    .actions code {
      background: #0f0f23;
      padding: 10px 20px;
      border-radius: 8px;
      display: inline-block;
      margin: 5px;
      font-family: 'Monaco', 'Menlo', monospace;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
    }
    .lightbox-info {
      position: absolute;
      bottom: 30px;
      text-align: center;
      width: 100%;
    }
    .lightbox-info h3 { color: #00d9ff; margin-bottom: 5px; }
    .lightbox-info p { color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>🎨 Wallpaper Preview</h1>
  <p class="summary">Source: hhkungfu.ee | Preview trước khi upload lên Cloudflare R2</p>

  <div id="content"></div>

  <div class="actions">
    <h3>Commands để upload</h3>
    <code>node uploader.js</code> - Upload tất cả<br>
    <code>node uploader.js --category=tu-tien</code> - Chỉ Tu Tiên<br>
    <code>node uploader.js --dry-run</code> - Test không upload
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-info">
      <h3 id="lightbox-title"></h3>
      <p id="lightbox-path"></p>
    </div>
  </div>

  <script>
    const data = SCRAPED_DATA_PLACEHOLDER;

    function slugifyCategory(category) {
      return category
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd')
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim() || 'unknown';
    }

    // Filter out non-genre categories
    const excludeCategories = [
      'hhkungfu', 'hhkungfu tv', 'hoạt hình kungfu', 'hoat hinh kungfu',
      'vietsub', 'full hd', '4k', 'hd', 'anime', 'donghua'
    ];

    function getValidCategories(item) {
      const cats = item.categories || [item.category] || ['Unknown'];
      return cats.filter(c => !excludeCategories.some(ex => c.toLowerCase().includes(ex)));
    }

    // Group by primary category (first valid one)
    const byCategory = {};
    data.forEach(item => {
      const validCats = getValidCategories(item);
      const primaryCat = validCats[0] || 'Unknown';
      if (!byCategory[primaryCat]) byCategory[primaryCat] = [];
      byCategory[primaryCat].push({ ...item, validCategories: validCats });
    });

    // Render
    const content = document.getElementById('content');
    Object.entries(byCategory).forEach(([cat, items]) => {
      const catSlug = slugifyCategory(cat);
      const section = document.createElement('div');
      section.className = 'category';
      section.innerHTML = `
        <div class="category-header">
          <h2>📁 ${cat}</h2>
          <span class="count">${items.length} ảnh → wallpaper/${catSlug}/</span>
        </div>
        <div class="grid">
          ${items.map(item => {
            const targetPath = `wallpaper/${catSlug}/${item.slug}.webp`;
            const tags = (item.validCategories || []).slice(0, 3);
            return `
              <div class="card" onclick="openLightbox('${item.imageUrl}', '${item.title.replace(/'/g, "\\'")}', '${targetPath}')">
                <img src="${item.imageUrl}" alt="${item.title}" loading="lazy">
                <div class="card-info">
                  <div class="card-title">${item.title}</div>
                  <div class="card-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      content.appendChild(section);
    });

    function openLightbox(src, title, path) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-title').textContent = title;
      document.getElementById('lightbox-path').textContent = path;
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
